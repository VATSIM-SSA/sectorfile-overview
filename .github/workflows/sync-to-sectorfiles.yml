name: Sync files to sector-file repos

# Mirrors the paths listed in .github/sync.yml out to every sector repo listed
# in repository-management/sectors.yml.
#
# Nothing in this file needs editing to add a file or a repo:
#   WHAT to sync  -> .github/sync.yml
#   WHERE it goes -> repository-management/sectors.yml

on:
  push:
    branches: [main]
    paths:
      # GitHub Actions cannot read these from sync.yml, so they are deliberately
      # broad: any change under a synced tree triggers a run, and the workflow
      # then does the precise filtering from sync.yml. Keep these wide rather
      # than exact — a missed trigger is a silent failure.
      - 'Plugins/**'
      - 'vatis/airports-json/**'
      - 'repository-management/templates/issues/**'
      - '.github/sync.yml'
      - 'repository-management/sectors.yml'
      - '.github/workflows/sync-to-sectorfiles.yml'
  workflow_dispatch:
    inputs:
      only:
        description: "Limit the sync to these sectors (comma-separated CODES, e.g. FASA,FVHF). Empty = all. Use to test one sector before a full run."
        required: false
        type: string
      dry_run:
        description: "Show exactly what WOULD change in each target and stop — no commit, no push. Verify a run this way before syncing for real."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  load-config:
    name: Validate config
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.cfg.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate config
        id: cfg
        env:
          ONLY: ${{ inputs.only }}
        run: |
          set -euo pipefail

          # Fail loudly on a missing source path. Skipping a missing file with a
          # "Notice" and still going green is how a typo'd path ships as a
          # passing build that deploys nothing.
          missing=0
          while IFS=$'\t' read -r src dest; do
            if [ ! -e "$src" ]; then
              echo "::error::sync.yml lists a source that does not exist: '$src'"
              missing=1
            else
              echo "ok: $src -> $dest"
            fi
          done < <(yq -o=json '.' .github/sync.yml | jq -r '.sync[] | [.src, .dest] | @tsv')
          [ "$missing" -eq 0 ] || exit 1

          # Targets come from the sector registry, not from sync.yml — one list,
          # shared with the AIRAC workflow, so they cannot drift apart.
          # The `only` dispatch input filters that list by sector CODE, so one
          # sector can be synced on its own to verify a run before a full fan-out.
          # awk trims and drops blank lines and exits 0 on EMPTY input; an earlier
          # `grep -v '^$'` returned exit 1 on the empty (all-sectors) case, which
          # tripped `set -o pipefail` and failed the whole job before any sync.
          only_json="$(printf '%s' "$ONLY" | tr ',' '\n' | awk '{gsub(/^ +| +$/,"")} NF' | jq -R 'ascii_upcase' | jq -s -c '.')"
          echo "Filter: ${ONLY:-<all sectors>}"

          # Validate every requested code exists, so a typo fails loudly instead
          # of silently syncing nothing.
          if [ "$only_json" != "[]" ]; then
            unknown="$(yq -o=json '.' repository-management/sectors.yml \
              | jq -r --argjson only "$only_json" \
                  '($only) - ([.sectors[].code | ascii_upcase]) | .[]')"
            if [ -n "$unknown" ]; then
              echo "::error::unknown sector code(s) in 'only': $(echo "$unknown" | paste -sd, -)"
              exit 1
            fi
          fi

          targets="$(yq -o=json '.' repository-management/sectors.yml \
            | jq -c --argjson only "$only_json" \
                '[.sectors[] | select(($only|length)==0 or (([.code|ascii_upcase] - $only)|length)==0) | "VATSIM-SSA/" + .repo]')"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Target repos: $(echo "$targets" | jq 'length')"
          echo "$targets" | jq -r '.[]'

  sync:
    name: ${{ matrix.target }}
    needs: load-config
    runs-on: ubuntu-latest
    # ACT_COPY_TO_REPO_PAT lives in this environment, which is restricted to the
    # `main` branch. A workflow pushed to any other branch cannot read it — so a
    # token-exfiltration workflow can only work if it is merged to main, which
    # requires a Code Owner review of .github/**.
    environment: sync
    strategy:
      # One failing repo must not stop the rest from syncing.
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.load-config.outputs.targets) }}
    # Two merges in quick succession would otherwise race each other on the
    # same target repo and lose a push.
    concurrency:
      group: sync-${{ matrix.target }}
      cancel-in-progress: false
    steps:
      - name: Checkout overview (source)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout ${{ matrix.target }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target }}
          token: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
          path: target

      - name: Mirror configured paths
        run: |
          set -euo pipefail
          # ADD-AND-OVERWRITE ONLY — never delete. rsync WITHOUT --delete copies
          # every source file into the target, overwriting a target file that has
          # the same path, and leaving every OTHER file in the target untouched.
          # That is the whole point of this rewrite: each sector keeps its own
          # custom files (per-repo GroundRadar/TopSky settings, extra profiles),
          # and the only files this workflow ever changes are the ones it
          # explicitly ships from the overview repo. A file removed from the
          # overview repo is NOT removed from the sectors — deletion is never
          # synced. (An earlier version used `--delete`, which wiped every
          # per-repo custom file that did not also exist here.)
          while IFS=$'\t' read -r src dest; do
            echo "::group::$src -> $dest"
            if [ -d "source/$src" ]; then
              mkdir -p "target/$dest"
              rsync -a "source/$src/" "target/$dest/"
            else
              mkdir -p "$(dirname "target/$dest")"
              rsync -a "source/$src" "target/$dest"
            fi
            echo "::endgroup::"
          done < <(yq -o=json '.' source/.github/sync.yml | jq -r '.sync[] | [.src, .dest] | @tsv')

      - name: Commit and push
        working-directory: target
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS=$'\t' read -r src dest; do
            # --ignore-removal stages additions and MODIFICATIONS but never a
            # deletion — a second guard on top of dropping rsync's --delete, so
            # even if a file vanished from a target for any other reason this
            # workflow will not commit that removal. Deletion is never synced.
            git add --ignore-removal -- "$dest"
          done < <(yq -o=json '.' ../source/.github/sync.yml | jq -r '.sync[] | [.src, .dest] | @tsv')

          if git diff --cached --quiet; then
            echo "${{ matrix.target }} already up to date — nothing to push."
            exit 0
          fi

          echo "Changes for ${{ matrix.target }}:"
          git diff --cached --stat

          # Belt-and-braces: this workflow must NEVER record a deletion. If a
          # deletion is staged despite the two guards above, stop rather than
          # push it — a failed run is recoverable, a silent mass-delete is what
          # started all this.
          if git diff --cached --name-status | grep -qE '^D'; then
            echo "::error::A deletion was staged — refusing to push. This workflow never deletes."
            git diff --cached --name-status | grep -E '^D' || true
            exit 1
          fi

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "::notice::DRY RUN — the diff above is what WOULD be committed to ${{ matrix.target }}. Nothing pushed."
            exit 0
          fi

          git commit -m "chore: sync shared files from sectorfile-overview

          Automated by sectorfile-overview/.github/workflows/sync-to-sectorfiles.yml
          Source commit: ${{ github.sha }}"

          # A human (or another run) may have pushed since we checked out.
          git push origin HEAD:main || {
            echo "Push rejected — rebasing and retrying once."
            git pull --rebase origin main
            git push origin HEAD:main
          }
