name: Sector Status Board

# Keeps ONE Discord message permanently up to date with which AIRAC cycle every
# sector is actually on. It never posts a second message: the first run creates
# it and stores the message id in the SECTOR_STATUS_MESSAGE_ID repo variable;
# every run after that PATCHes that same message.
#
# Source of truth is the newest tracker issue (open or closed) — the `cycle` and
# Download link on each line. Order and grouping come from sectors.yml, so the
# layout is stable no matter how the issue is edited.
#
# Colours: 🟢 current cycle · 🔵 one behind · 🟡 two behind · ⚪ older/unknown.
#
# ⚠️ A webhook can only edit messages IT posted. The old hand-written status
# message cannot be adopted — delete it once this one is live.

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  issues:
    # Ticking a sector or changing its cycle refreshes the board immediately —
    # no waiting for tomorrow's run, no manual dispatch.
    types: [edited]
  workflow_dispatch:

permissions: {}

env:
  BOT_NAME: VATSSA Operations Bot
  BOT_ICON: https://palette.vatssa.com/logo_icon.png
  # Committed to this repo rather than an external host so it is versioned with
  # the workflow. Discord proxies raw.githubusercontent.com images fine.
  BANNER_URL: https://raw.githubusercontent.com/VATSIM-SSA/sectorfile-overview/main/repository-management/assets/airac-banner.png

concurrency:
  # Two runs editing the same message would race on creating it.
  group: sector-status
  cancel-in-progress: false

jobs:
  board:
    name: Update the board
    # `issues: edited` fires for every issue in the repo — ignore all but trackers.
    if: >-
      github.event_name != 'issues'
      || contains(github.event.issue.title, 'Sector Deployment Tracker')
    runs-on: ubuntu-latest
    # The PAT lives in this environment, which is restricted to `main`.
    environment: sync
    env:
      GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
      WEBHOOK: ${{ secrets.DISCORD_STATUS_WEBHOOK }}
      MESSAGE_ID: ${{ vars.SECTOR_STATUS_MESSAGE_ID }}
    steps:
      # Checkout with the PAT (not the default GITHUB_TOKEN) so the commit step
      # below can push status.json back to main. The PAT is a ruleset bypass
      # actor; GITHUB_TOKEN is not, so a default checkout could never land the
      # file on a protected branch.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACT_COPY_TO_REPO_PAT }}

      - name: Build the board from the newest tracker
        id: build
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::error::DISCORD_STATUS_WEBHOOK is not set — nothing to post to."
            exit 1
          fi

          # Newest tracker wins, open or closed: between cycles the last one is
          # still the truth about where each sector got to.
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 200 \
                  --json number,title \
                  --jq '[.[] | select(.title | contains("Sector Deployment Tracker")) | .number] | max // empty')
          if [ -z "$NUM" ]; then
            echo "::error::No tracker issue exists yet — run the AIRAC workflow first."
            exit 1
          fi
          echo "Reading tracker #$NUM"
          gh issue view "$NUM" --repo "$GITHUB_REPOSITORY" --json body --jq .body > /tmp/tracker.md

          python3 repository-management/airac.py --status /tmp/tracker.md > /tmp/board.txt
          echo "--- board ---"
          cat /tmp/board.txt

          python3 - > /tmp/payload.json << 'PYEOF'
          import json, os, sys, time
          sys.path.insert(0, "repository-management")
          from airac import current_cycle, date_for_cycle, human

          board = open("/tmp/board.txt", encoding="utf-8").read().strip()
          if not board:
              # An empty board means the tracker did not parse. Posting it would
              # silently blank the message staff rely on.
              print("::error::Board rendered empty — tracker format changed?", file=sys.stderr)
              raise SystemExit(1)

          cur = current_cycle() or "----"
          d = date_for_cycle(cur)
          effective = human(d) if d else "unknown"
          org = os.environ["GITHUB_REPOSITORY"].split("/")[0]

          # VATSSA green across both embeds so they read as a single card and
          # match the AIRAC publish/release announcements (which are green too).
          TEAL = 0x7BD758
          BANNER = os.environ["BANNER_URL"]

          # <t:UNIX:R> renders as "2 hours ago" and keeps counting in the client,
          # so it stays honest between runs instead of freezing at the last one.
          stamp = f"<t:{int(time.time())}:R>"

          board_embed = {
              "title": "AIRAC Updates — Sector Status",
              "url": "https://files.aero-nav.com",
              # -# is Discord subtext: small and grey, so the cycle line reads as
              # context rather than competing with the region headers.
              "description": (
                  f"-# Current cycle **AIRAC {cur}** · effective {effective} · "
                  f"updated {stamp}\n"
                  f"{board}"
              ),
              "color": TEAL,
              "footer": {
                  "text": "🟢 current  ·  🔵 one behind  ·  🟡 two behind  ·  ⚪ older",
                  "icon_url": os.environ["BOT_ICON"],
              },
          }

          contribute_embed = {
              "title": "Want to Contribute?",
              "url": f"https://github.com/{org}",
              "description": (
                  f"VATSSA welcomes contributions to the operations department from "
                  f"any member.\n\n"
                  f"Every sector file lives on the "
                  f"[VATSIM SSA GitHub organisation](https://github.com/{org}). "
                  f"Anyone with a GitHub account can open an issue to report a problem, "
                  f"or send a pull request to fix one."
              ),
              "color": TEAL,
              # Banner sits on the LAST embed so it closes the whole message.
              "image": {"url": BANNER},
          }

          print(json.dumps({
              "username": os.environ["BOT_NAME"],
              "avatar_url": os.environ["BOT_ICON"],
              "content": "",
              "embeds": [board_embed, contribute_embed],
          }))
          PYEOF
          echo "payload $(wc -c < /tmp/payload.json) bytes"

      - name: Write status.json and commit it
        # The SAME board information as the Discord embed, emitted as JSON and
        # committed to the repo so a website can fetch it from
        # raw.githubusercontent.com/VATSIM-SSA/sectorfile-overview/main/data/status.json
        # It is generated from the same tracker + sectors.yml as the embed, so
        # the site and Discord can never show different cycles.
        run: |
          set -euo pipefail
          mkdir -p data
          python3 repository-management/airac.py --status-json /tmp/tracker.md > data/status.json
          echo "--- status.json ---"
          head -c 800 data/status.json; echo

          # Stage FIRST, then compare the index against HEAD. `git diff --quiet`
          # on its own ignores an untracked file, so on the very first run (when
          # data/status.json does not yet exist in the repo) it wrongly reported
          # "unchanged" and never committed the new file.
          git add data/status.json
          if git diff --cached --quiet -- data/status.json; then
            echo "status.json unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(status): refresh data/status.json (generated)"
          # The checkout used the PAT (a bypass actor), so this push lands on main
          # even with the branch ruleset active. A human may have pushed since.
          git push origin HEAD:main || {
            echo "Push rejected — rebasing and retrying once."
            git pull --rebase origin main
            git push origin HEAD:main
          }

      - name: Create or update the message
        id: post
        run: |
          set -euo pipefail

          # ?wait=true makes Discord return the created message so we can capture
          # its id; without it the POST returns 204 and the id is lost forever.
          create() {
            ID=$(curl -sS -H "Content-Type: application/json" \
                   -X POST "${WEBHOOK}?wait=true" -d @/tmp/payload.json \
                 | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
            echo "Created status message $ID"
            gh variable set SECTOR_STATUS_MESSAGE_ID --repo "$GITHUB_REPOSITORY" --body "$ID"
            echo "Stored id in the SECTOR_STATUS_MESSAGE_ID variable"
          }

          if [ -z "${MESSAGE_ID:-}" ]; then
            echo "No message id recorded — creating the board for the first time."
            create
            exit 0
          fi

          CODE=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
                   -H "Content-Type: application/json" \
                   -X PATCH "${WEBHOOK}/messages/${MESSAGE_ID}" -d @/tmp/payload.json)

          if [ "$CODE" = "200" ]; then
            echo "Updated status message ${MESSAGE_ID}"
          elif [ "$CODE" = "404" ]; then
            # Someone deleted it. Recreate rather than fail forever.
            echo "::warning::Message ${MESSAGE_ID} is gone — recreating."
            create
          else
            echo "::error::Discord returned $CODE"
            cat /tmp/resp.json
            exit 1
          fi
