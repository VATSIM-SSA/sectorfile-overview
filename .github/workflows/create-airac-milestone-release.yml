name: Create AIRAC Milestones and Releases

# On each AIRAC date, for every sector in repository-management/sectors.yml:
#   1. Create the AIRAC milestone
#   2. Carry still-open issues from earlier AIRAC milestones onto it, then close
#      those older milestones
#   3. Cut the release (AIRAC 2607 #1 / v26.07.1) with auto-generated notes
# ...and open ONE deployment tracker issue in this repo covering all sectors.
#
# Sectors are defined in repository-management/sectors.yml — nothing here needs
# editing to add one.
#
# AIRAC dates are COMPUTED, not looked up: cycles are exactly 28 days apart,
# anchored on AIRAC 2601 = 2026-01-22. airac-dates.csv is regenerated from that
# formula as a human reference; it is never the source of truth and can never
# "run out".

on:
  workflow_dispatch:
    inputs:
      airac_cycle:
        description: "AIRAC cycle (YYNN, e.g. 2607). Empty = auto-detect from today."
        required: false
        type: string
      new_revision:
        description: "Cut the NEXT revision (#2 / v26.07.2) instead of skipping an existing release."
        required: false
        default: false
        type: boolean
      extra_notes:
        description: "Extra release-note text added to EVERY sector (e.g. files synced from this repo). Markdown, blank lines OK."
        required: false
        type: string
      only_sectors:
        description: "Limit the run to these sectors (comma-separated codes, e.g. FASA,FVHF). Empty = all. Use with new_revision to re-cut ONE sector."
        required: false
        type: string
  schedule:
    - cron: "0 1 * * 4" # Thursdays 01:00 UTC — AIRAC cycles always start Thursday

permissions: {}

env:
  # Discord webhook identity. The avatar MUST be a raster format — Discord's CDN
  # silently ignores an SVG and falls back to a blank default avatar.
  BOT_NAME: VATSSA Operations Bot
  BOT_ICON: https://palette.vatssa.com/logo_icon.png

concurrency:
  # A manual dispatch landing on top of the scheduled run would otherwise
  # double-create milestones and race on release revision numbers.
  # Literal, not ${{ github.workflow }}: a run stuck in GitHub's backend holds
  # its group forever, and bumping this name is the only way to retire one.
  group: airac-cycle
  cancel-in-progress: false

jobs:
  prepare:
    name: Determine AIRAC cycle
    runs-on: ubuntu-latest
    outputs:
      airac_cycle: ${{ steps.airac.outputs.airac_cycle }}
      airac_date: ${{ steps.airac.outputs.airac_date }}
      airac_human: ${{ steps.airac.outputs.airac_human }}
      should_run: ${{ steps.airac.outputs.should_run }}
      sectors: ${{ steps.airac.outputs.sectors }}
      future: ${{ steps.airac.outputs.future }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve cycle from the 28-day formula
        id: airac
        env:
          AIRAC_INPUT: ${{ inputs.airac_cycle }}
          ONLY_SECTORS: ${{ inputs.only_sectors }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          sys.path.insert(0, "repository-management")
          from airac import cycle_for_date, date_for_cycle, human, load_sectors, next_cycles
          from datetime import date

          wanted = os.environ.get("AIRAC_INPUT", "").strip()
          today = date.today()

          if wanted:
              d = date_for_cycle(wanted)
              if d is None:
                  raise SystemExit(f"'{wanted}' is not a valid AIRAC cycle")
              cycle, cdate, run = wanted, d, "true"
          else:
              c = cycle_for_date(today)
              if c:
                  cycle, cdate, run = c, today, "true"
              else:
                  cycle, cdate, run = "none", today, "false"

          sectors = load_sectors("repository-management/sectors.yml")

          # A revision usually fixes ONE sector. Without this filter,
          # new_revision cuts a #2 in all 25 repos — 24 of them pointless.
          only = [c.strip().upper() for c in os.environ.get("ONLY_SECTORS", "").split(",") if c.strip()]
          if only:
              known = {s["code"].upper() for s in sectors}
              unknown = [c for c in only if c not in known]
              if unknown:
                  raise SystemExit(f"unknown sector code(s): {', '.join(unknown)}")
              sectors = [s for s in sectors if s["code"].upper() in only]
              print(f"Limited to: {', '.join(s['code'] for s in sectors)}")

          # Milestones are cut for the cycles AHEAD of this one, so issues can be
          # planned forward. The release is still cut for `cycle` itself.
          future = [[c, d.isoformat()] for c, d in next_cycles(cycle, 3)] if run == "true" else []

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"airac_cycle={cycle}\n")
              f.write(f"airac_date={cdate.isoformat()}\n")
              f.write(f"airac_human={human(cdate) if cycle != 'none' else ''}\n")
              f.write(f"should_run={run}\n")
              # Objects, not bare names: the release step needs `code` to find and
              # upload the vATIS profile, and code != repo suffix for FYWH.
              f.write("sectors=" + json.dumps(
                  [{"repo": s["repo"], "code": s["code"], "vatis": bool(s.get("vatis"))}
                   for s in sectors]
              ) + "\n")
              f.write(f"future={json.dumps(future)}\n")

          print(f"Cycle      : {cycle}")
          print(f"Date       : {cdate}")
          print(f"Should run : {run}")
          print(f"Sectors    : {len(sectors)}")
          print(f"Milestones : {[c for c, _ in future]}")
          PYEOF

  refresh-dates:
    name: Top up airac-dates.csv
    runs-on: ubuntu-latest
    environment: sync
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate the reference CSV
        run: python3 repository-management/airac.py --write --years-ahead 3

      - name: Commit if it changed
        env:
          GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
        run: |
          set -euo pipefail
          if git diff --quiet -- repository-management/airac-dates.csv; then
            echo "airac-dates.csv already covers the horizon — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repository-management/airac-dates.csv
          git commit -m "chore(airac): extend airac-dates.csv (generated)"
          # Best-effort: the CSV is a generated convenience, not the source of
          # truth, so a protected branch rejecting this must not fail the run.
          git push origin HEAD:main || \
            echo "::warning::Could not push the regenerated airac-dates.csv (branch protection?). Dates are still computed correctly at runtime."

  create:
    name: "${{ matrix.sector.repo }}"
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # The PAT lives in this environment, which is restricted to `main`.
    environment: sync
    strategy:
      fail-fast: false
      matrix:
        sector: ${{ fromJSON(needs.prepare.outputs.sectors) }}
    env:
      AIRAC_CYCLE: ${{ needs.prepare.outputs.airac_cycle }}
      AIRAC_DATE: ${{ needs.prepare.outputs.airac_date }}
      NEW_REVISION: ${{ inputs.new_revision }}
      EXTRA_NOTES: ${{ inputs.extra_notes }}
      REPO: VATSIM-SSA/${{ matrix.sector.repo }}
      CODE: ${{ matrix.sector.code }}
      HAS_VATIS: ${{ matrix.sector.vatis }}
      GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
    steps:
      # Needed for repository-management/airac.py — the milestone and carry-over
      # steps import it to compare cycles.
      - uses: actions/checkout@v4

      - name: Skip archived repositories
        id: guard
        run: |
          set -euo pipefail
          if [ "$(gh api "repos/$REPO" --jq .archived)" = "true" ]; then
            echo "::notice::$REPO is archived — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create the next three milestones
        if: steps.guard.outputs.skip == 'false'
        id: milestone
        env:
          FUTURE: ${{ needs.prepare.outputs.future }}
        run: |
          set -euo pipefail

          # Milestones are cut AHEAD of the cycle being released: work is planned
          # into future cycles, so on the 2607 run we open 2608/2609/2610. The
          # release below is still cut for 2607.
          NEXT=""
          echo "$FUTURE" | python3 -c "import json,sys; [print(c,d) for c,d in json.load(sys.stdin)]" |
          while read -r CYC CDATE; do
            NUM=$(gh api "repos/$REPO/milestones?state=all&per_page=100" --paginate \
                    --jq ".[] | select(.title == \"AIRAC $CYC\") | .number" | head -1)
            if [ -z "$NUM" ]; then
              NUM=$(gh api "repos/$REPO/milestones" --method POST \
                      -f title="AIRAC $CYC" \
                      -f due_on="${CDATE}T00:00:00Z" \
                      -f state="open" --jq .number)
              echo "Created milestone 'AIRAC $CYC' (#$NUM)"
            else
              echo "Milestone 'AIRAC $CYC' already exists (#$NUM)"
            fi
          done

          # The first future cycle is where unfinished work lands.
          NEXT_CYCLE=$(echo "$FUTURE" | python3 -c "import json,sys; print(json.load(sys.stdin)[0][0])")
          NEXT=$(gh api "repos/$REPO/milestones?state=all&per_page=100" --paginate \
                   --jq ".[] | select(.title == \"AIRAC $NEXT_CYCLE\") | .number" | head -1)
          echo "next_cycle=$NEXT_CYCLE" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Carry unfinished work onto the next cycle, close spent milestones
        if: steps.guard.outputs.skip == 'false'
        env:
          NEXT: ${{ steps.milestone.outputs.next }}
          NEXT_CYCLE: ${{ steps.milestone.outputs.next_cycle }}
        run: |
          set -euo pipefail

          # Only milestones for cycles AT OR BEFORE the one being released are
          # spent. The future ones we just created (2609, 2610, ...) exist so work
          # can be planned into them — sweeping those would destroy that planning,
          # which is exactly what the old "anything that isn't current" rule did.
          gh api "repos/$REPO/milestones?state=open&per_page=100" --paginate \
            --jq '.[] | select(.title | startswith("AIRAC ")) | [.number, .title] | @tsv' > /tmp/open.tsv

          SPENT=$(python3 - << 'PYEOF'
          import os, sys
          sys.path.insert(0, "repository-management")
          from airac import cycles_behind

          current = os.environ["AIRAC_CYCLE"]
          out = []
          with open("/tmp/open.tsv", encoding="utf-8") as f:
              for line in f:
                  if not line.strip():
                      continue
                  num, title = line.rstrip("\n").split("\t", 1)
                  cyc = title.split()[-1]
                  behind = cycles_behind(cyc, current)
                  # behind >= 0 -> that cycle is current or older, i.e. spent.
                  if behind is not None and behind >= 0:
                      out.append(num)
          print(" ".join(out))
          PYEOF
          )

          if [ -z "$SPENT" ]; then
            echo "No spent AIRAC milestones (nothing at or before $AIRAC_CYCLE)."
            exit 0
          fi

          for m in $SPENT; do
            TITLE=$(gh api "repos/$REPO/milestones/$m" --jq .title)
            echo "::group::Carrying over from '$TITLE' (#$m)"
            ISSUES=$(gh api "repos/$REPO/issues?milestone=$m&state=open&per_page=100" \
                       --paginate --jq '.[] | .number' || true)
            if [ -z "$ISSUES" ]; then
              echo "  nothing still open"
            else
              for i in $ISSUES; do
                gh api "repos/$REPO/issues/$i" --method PATCH -F milestone="$NEXT" >/dev/null
                echo "  moved #$i -> AIRAC $NEXT_CYCLE"
              done
            fi
            gh api "repos/$REPO/milestones/$m" --method PATCH -f state=closed >/dev/null
            echo "  closed '$TITLE'"
            echo "::endgroup::"
          done

      - name: Create release
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail

          # Tag format is v<YY>.<NN>.<REV>, e.g. AIRAC 2607 #1 -> v26.07.1.
          # NOTE: no dot after the "v" — this matches every existing release.
          YY="${AIRAC_CYCLE:0:2}"
          NN="${AIRAC_CYCLE:2:2}"

          # Highest revision already cut for this cycle, so a re-run lands on
          # #2, #3... rather than colliding or silently doing nothing.
          LATEST=$(gh api "repos/$REPO/releases?per_page=100" --paginate \
                     --jq "[.[] | .tag_name | select(startswith(\"v${YY}.${NN}.\")) | split(\".\") | last | tonumber] | max // 0")

          if [ "$LATEST" -gt 0 ] && [ "$NEW_REVISION" != "true" ]; then
            echo "v${YY}.${NN}.${LATEST} already exists for AIRAC $AIRAC_CYCLE — skipping."
            echo "Re-run with new_revision: true to cut #$((LATEST + 1))."
            exit 0
          fi

          REV=$((LATEST + 1))
          TAG="v${YY}.${NN}.${REV}"
          NAME="AIRAC ${AIRAC_CYCLE} #${REV}"

          # GitHub PRE-pends `body` to the notes it generates, so the NavData line
          # and any synced-file notes sit above the auto PR list.
          # EXTRA_NOTES only exists on a manual dispatch — the scheduled run gets
          # the NavData line alone, since there is nobody there to type the rest.
          BODY="Updated NavData to the current AIRAC ${AIRAC_CYCLE}"
          if [ -n "${EXTRA_NOTES:-}" ]; then
            BODY="${BODY}"$'\n\n'"${EXTRA_NOTES}"
          fi

          # generate_release_notes builds the PR list since the previous release —
          # no hand-written changelog.
          gh api "repos/$REPO/releases" --method POST \
            -f tag_name="$TAG" \
            -f target_commitish="main" \
            -f name="$NAME" \
            -f body="$BODY" \
            -F draft=false \
            -F prerelease=false \
            -F generate_release_notes=true >/dev/null

          echo "Created release '$NAME' ($TAG)"

      - name: Attach the vATIS profile to the release
        # Runs even when the release already existed, so re-running a cycle
        # back-fills assets onto releases cut before this step existed.
        if: steps.guard.outputs.skip == 'false' && env.HAS_VATIS == 'true'
        run: |
          set -euo pipefail

          # The board links to /releases/latest/download/<CODE>.json. That only
          # downloads (rather than rendering as text) because release assets send
          # Content-Disposition: attachment — a raw.githubusercontent URL does not.
          YY="${AIRAC_CYCLE:0:2}"
          NN="${AIRAC_CYCLE:2:2}"
          TAG=$(gh api "repos/$REPO/releases?per_page=100" --paginate \
                  --jq "[.[] | .tag_name | select(startswith(\"v${YY}.${NN}.\"))] | sort | last // empty")
          if [ -z "$TAG" ]; then
            echo "::warning::No release for AIRAC $AIRAC_CYCLE — nothing to attach to."
            exit 0
          fi

          URL=$(gh api "repos/$REPO/contents/vATIS/${CODE}.json" --jq .download_url 2>/dev/null || true)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::warning::$REPO has no vATIS/${CODE}.json — clear 'vatis' in sectors.yml."
            exit 0
          fi

          curl -sSfL "$URL" -o "/tmp/${CODE}.json"
          python3 -c "import json,sys; json.load(open(sys.argv[1]))" "/tmp/${CODE}.json" \
            || { echo "::error::vATIS/${CODE}.json is not valid JSON"; exit 1; }

          gh release upload "$TAG" "/tmp/${CODE}.json" --repo "$REPO" --clobber
          echo "Attached ${CODE}.json to $TAG"

      - name: Ensure the NavData note is on the release
        # Create-release adds "Updated NavData to the current AIRAC ..." to the
        # body, but only when it CREATES the release — an already-existing release
        # (the skip path) never gets it. This runs every time and PATCHes the line
        # onto the current cycle's latest release if it's missing, so re-running
        # the workflow back-fills every sector that was published without it.
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          YY="${AIRAC_CYCLE:0:2}"
          NN="${AIRAC_CYCLE:2:2}"
          TAG=$(gh api "repos/$REPO/releases?per_page=100" --paginate \
                  --jq "[.[] | .tag_name | select(startswith(\"v${YY}.${NN}.\"))] | sort | last // empty")
          if [ -z "$TAG" ]; then
            echo "::warning::No release for AIRAC $AIRAC_CYCLE — nothing to annotate."
            exit 0
          fi

          NOTE="Updated NavData to the current AIRAC ${AIRAC_CYCLE}"
          gh api "repos/$REPO/releases/tags/$TAG" > /tmp/rel.json
          ID=$(python3 -c "import json; print(json.load(open('/tmp/rel.json'))['id'])")
          BODY=$(python3 -c "import json; print(json.load(open('/tmp/rel.json')).get('body') or '')")

          if printf '%s' "$BODY" | grep -qF "$NOTE"; then
            echo "NavData note already present on $TAG."
            exit 0
          fi

          # Prepend the note so it sits above the generated changelog.
          NEWBODY="$NOTE"$'\n\n'"$BODY"
          gh api "repos/$REPO/releases/$ID" --method PATCH -f body="$NEWBODY" >/dev/null
          echo "Added the NavData note to $TAG"

  tracker:
    name: Deployment tracker issue
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: sync
    outputs:
      issue: ${{ steps.open.outputs.issue }}
    env:
      AIRAC_CYCLE: ${{ needs.prepare.outputs.airac_cycle }}
      AIRAC_HUMAN: ${{ needs.prepare.outputs.airac_human }}
      GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Open the tracker
        id: open
        run: |
          set -euo pipefail
          TITLE="AIRAC ${AIRAC_CYCLE} — Sector Deployment Tracker"

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 200 \
                       --json number,title \
                       --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Tracker already exists: #$EXISTING"
            echo "issue=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Seed from the most recent previous tracker so each sector's recorded
          # cycle and any overridden download link carry forward. Without this the
          # new tracker would forget everything the last one knew.
          PREV=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 200 \
                   --json number,title \
                   --jq '[.[] | select(.title | contains("Sector Deployment Tracker")) | .number] | max // empty')
          SEED_ARG=""
          if [ -n "$PREV" ]; then
            gh issue view "$PREV" --repo "$GITHUB_REPOSITORY" --json body --jq .body > /tmp/prev.md
            SEED_ARG="--seed /tmp/prev.md"
            echo "Seeding from tracker #$PREV"
          else
            echo "No previous tracker — sectors start at ----"
          fi

          # Body is generated from the sector registry, so the links and grouping
          # cannot drift from reality. All boxes start unticked.
          python3 repository-management/airac.py --tracker "$AIRAC_CYCLE" $SEED_ARG > /tmp/body.md

          NUM=$(gh issue create --repo "$GITHUB_REPOSITORY" \
                  --title "$TITLE" --body-file /tmp/body.md | grep -oE '[0-9]+$')
          echo "Opened tracker #$NUM"
          echo "issue=$NUM" >> "$GITHUB_OUTPUT"

          # Only ever one live tracker: close the previous cycle's and link forward.
          PREV=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 200 \
                   --json number,title \
                   --jq ".[] | select(.title | contains(\"Sector Deployment Tracker\")) | select(.number != $NUM) | .number")
          for p in $PREV; do
            gh issue comment "$p" --repo "$GITHUB_REPOSITORY" --body "Superseded by #${NUM} (AIRAC ${AIRAC_CYCLE})."
            gh issue close "$p" --repo "$GITHUB_REPOSITORY"
            echo "Closed previous tracker #$p"
          done

  gng-notes:
    name: Collect GNG release notes
    needs: [prepare, create, tracker]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: sync
    env:
      AIRAC_CYCLE: ${{ needs.prepare.outputs.airac_cycle }}
      GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Gather every release each sector is behind by
        run: |
          set -euo pipefail

          # Each sector's tracker cycle is what GNG actually has. Anything released
          # on GitHub since then still needs writing up for GNG — possibly several
          # cycles' worth if a sector has been sitting behind for months.
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 200 \
                  --json number,title \
                  --jq '[.[] | select(.title | contains("Sector Deployment Tracker")) | .number] | max // empty')
          if [ -z "$NUM" ]; then
            echo "::warning::No tracker issue — cannot tell what GNG has. Skipping."
            exit 0
          fi
          gh issue view "$NUM" --repo "$GITHUB_REPOSITORY" --json body --jq .body > /tmp/tracker.md

          # One releases-list call per sector; the assembly happens in Python.
          mkdir -p /tmp/rel
          python3 -c "
          import sys; sys.path.insert(0, 'repository-management')
          from airac import load_sectors
          print('\n'.join(s['repo'] for s in load_sectors()))
          " > /tmp/repos.txt
          while read -r r; do
            gh api "repos/$GITHUB_REPOSITORY_OWNER/$r/releases?per_page=100" --paginate \
              --jq '[.[] | {tag: .tag_name, name: .name, body: .body}]' > "/tmp/rel/$r.json" 2>/dev/null \
              || echo '[]' > "/tmp/rel/$r.json"
          done < /tmp/repos.txt

          python3 - << 'PYEOF'
          import json, os, sys
          sys.path.insert(0, "repository-management")
          from airac import load_sectors, seed_from, cycles_behind, UNKNOWN_CYCLE

          current = os.environ["AIRAC_CYCLE"]
          state = seed_from(open("/tmp/tracker.md", encoding="utf-8").read())
          sectors = load_sectors()

          def tag_cycle(tag: str) -> str | None:
              # v26.07.1 -> 2607
              t = tag.lstrip("v").split(".")
              if len(t) < 2 or not (t[0].isdigit() and t[1].isdigit()):
                  return None
              return f"{t[0]}{t[1]}"

          out = [
              # Self-contained prompt: download this file, paste the whole thing
              # to an AI, and it follows these instructions — no separate prompt.
              "<!-- ============================ PROMPT FOR THE AI ============================",
              "You are preparing GNG (aero-nav) release notes for VATSSA sector files.",
              "",
              "Below this comment is one section per sector, each containing that",
              "sector's raw GitHub release notes for the current AIRAC cycle (and any",
              "older cycles GNG is still behind on).",
              "",
              "For EACH sector section, produce a clean GNG changelog entry:",
              f"  * Always start with: \"Updated NavData to the current AIRAC {current}\".",
              "  * Then, in short plain bullet points, summarise any real changes in",
              "    the release body (new positions, frequency changes, fixes, files).",
              "  * DROP the raw \"**Full Changelog**\" GitHub compare links.",
              "  * If a sector's only note is the NavData line, output just that line.",
              "  * Keep it member-facing and concise; no GitHub/markdown noise.",
              "",
              "Output grouped by sector under a \"### <sector name>\" heading, ready to",
              "copy each sector's block straight into GNG.",
              "============================================================================ -->",
              "",
              f"# GNG release notes outstanding — as of AIRAC {current}",
              "",
              "Every sector below is behind what GitHub has released. Each section",
              "lists the release notes GNG has not been given yet, oldest first.",
              "Paste this whole file to the AI; it follows the prompt at the top.",
              "",
              "---",
          ]

          behind_count = 0
          for s in sectors:
              have = (state.get(s["name"], {}).get("cycle") or UNKNOWN_CYCLE).strip()
              rels = json.load(open(f"/tmp/rel/{s['repo']}.json", encoding="utf-8"))

              # Unknown cycle -> we cannot tell what GNG has, so take everything
              # for the current cycle only rather than dumping the entire history.
              def outstanding(r):
                  c = tag_cycle(r["tag"])
                  if c is None:
                      return False
                  cb = cycles_behind(c, current)
                  if cb is None or cb < 0:
                      return False  # future release, ignore
                  # The current cycle was JUST cut, so GNG needs its notes no
                  # matter what the tracker says GNG already has. This is the fix
                  # for the notes silently not generating: once a sector's tracker
                  # cycle had been bumped to the current cycle, cycles_behind was 0
                  # (not < 0) and the just-released notes were dropped.
                  if c == current:
                      return True
                  if have == UNKNOWN_CYCLE or not have.isdigit():
                      return False  # older cycles only matter if we know GNG's state
                  b = cycles_behind(c, have)
                  return b is not None and b < 0  # released after what GNG has

              todo = [r for r in rels if outstanding(r)]
              todo.sort(key=lambda r: tag_cycle(r["tag"]) or "")
              if not todo:
                  continue

              behind_count += 1
              out.append("")
              out.append(f"## {s['name']} — GNG has {have}, GitHub is at {current}")
              for r in todo:
                  out.append("")
                  out.append(f"### {r['name'] or r['tag']} ({r['tag']})")
                  out.append("")
                  out.append((r["body"] or "_no notes_").strip())
              out.append("")
              out.append("---")

          if behind_count == 0:
              out = [
                  f"# GNG release notes outstanding — as of AIRAC {current}",
                  "",
                  "Nothing outstanding. Every sector's GNG release matches GitHub.",
              ]

          open("repository-management/gng-notes.md", "w", encoding="utf-8", newline="\n").write(
              "\n".join(out).rstrip() + "\n"
          )
          print(f"{behind_count} sector(s) behind")
          PYEOF

      - name: Commit the file
        run: |
          set -euo pipefail
          if git diff --quiet -- repository-management/gng-notes.md; then
            echo "gng-notes.md unchanged."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repository-management/gng-notes.md
          git commit -m "chore(gng): refresh outstanding release notes for AIRAC ${AIRAC_CYCLE} (generated)"
          # Best-effort, same as airac-dates.csv: a protected branch must not fail
          # the whole publish. The file is regenerated every cycle anyway.
          git push origin HEAD:main || \
            echo "::warning::Could not push gng-notes.md (branch protection?). Re-run or copy it from the run logs."

  notify-success:
    name: Discord announcement on publish
    needs: [prepare, refresh-dates, create, tracker]
    # Only on a genuinely clean publish. `always()` is needed for the result
    # checks to be evaluated at all; should_run keeps the 3-in-4 Thursdays that
    # aren't AIRAC dates silent, which is the whole point of the guard.
    if: >-
      always()
      && needs.prepare.outputs.should_run == 'true'
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
      && !contains(needs.*.result, 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Announce the cycle
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CYCLE: ${{ needs.prepare.outputs.airac_cycle }}
          HUMAN: ${{ needs.prepare.outputs.airac_human }}
          SECTORS: ${{ needs.prepare.outputs.sectors }}
          ISSUE: ${{ needs.tracker.outputs.issue }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK not set — no announcement sent."
            exit 0
          fi
          # Build the payload in Python: sector names and cycle text would
          # otherwise need hand-escaping into JSON inside a shell string.
          python3 - > /tmp/payload.json << 'PYEOF'
          import json, os

          sectors = json.loads(os.environ["SECTORS"])
          cycle, human = os.environ["CYCLE"], os.environ["HUMAN"]
          issue = os.environ.get("ISSUE", "").strip()
          base = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
          tracker = f"{base}/issues/{issue}" if issue else f"{base}/issues"

          print(json.dumps({
              "username": os.environ["BOT_NAME"],
              "avatar_url": os.environ["BOT_ICON"],
              "embeds": [{
                  "title": f"AIRAC {cycle} published",
                  "url": tracker,
                  "color": 8116056,
                  "description": (
                      f"Effective **{human}**.\n"
                      f"Milestones and releases created across **{len(sectors)}** sector repos.\n\n"
                      f"[Deployment tracker]({tracker}) — tick each sector as it goes out."
                  ),
              }],
          }))
          PYEOF
          curl -sS -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @/tmp/payload.json

  notify-failure:
    name: Discord alert on failure
    needs: [prepare, refresh-dates, create, tracker]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Ping Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK not set — no alert sent."
            exit 0
          fi
          curl -sS -H "Content-Type: application/json" -X POST "$WEBHOOK" -d "{
            \"username\": \"$BOT_NAME\",
            \"avatar_url\": \"$BOT_ICON\",
            \"embeds\": [{
              \"title\": \"❌ AIRAC automation failed\",
              \"url\": \"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",
              \"color\": 15158332,
              \"description\": \"Cycle **${{ needs.prepare.outputs.airac_cycle }}**. One or more sectors did not get their milestone or release. Check the run.\"
            }]
          }"
