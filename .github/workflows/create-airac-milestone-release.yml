name: Create AIRAC Milestones and Releases

on:
  workflow_dispatch:
    inputs:
      airac_cycle:
        description: "AIRAC cycle (YYNNN format, e.g. 2502). Leave empty to auto-detect from today's date."
        required: false
        type: string
  schedule:
    - cron: "0 1 * * 4" # Every Thursday at 01:00 UTC (AIRAC cycles always start on Thursdays)

permissions: {}

jobs:
  prepare:
    name: Determine AIRAC Cycle
    runs-on: ubuntu-latest
    outputs:
      airac_cycle: ${{ steps.airac.outputs.airac_cycle }}
      airac_date: ${{ steps.airac.outputs.airac_date }}
      should_run: ${{ steps.airac.outputs.should_run }}
    steps:
      - name: Calculate AIRAC Cycle
        id: airac
        env:
          AIRAC_INPUT: ${{ inputs.airac_cycle }}
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import date, timedelta

          # AIRAC epoch: January 29, 1998 (start of AIRAC 9801)
          # Verified: epoch + 352 * 28 days = January 23, 2025 = AIRAC 2501
          EPOCH = date(1998, 1, 29)

          def first_cycle_of_year(year):
              """Return the absolute cycle index of the first AIRAC cycle that starts in the given year."""
              year_start = date(year, 1, 1)
              days_to_year = (year_start - EPOCH).days
              # Add 27 before integer division to perform ceiling division for positive values
              idx = (days_to_year + 27) // 28
              cycle_start = EPOCH + timedelta(days=idx * 28)
              while cycle_start.year < year:
                  idx += 1
                  cycle_start = EPOCH + timedelta(days=idx * 28)
              return idx

          def date_to_airac(d):
              """Convert a date to an (airac_id, cycle_start) tuple."""
              days_from_epoch = (d - EPOCH).days
              total_cycles = days_from_epoch // 28
              cycle_start = EPOCH + timedelta(days=total_cycles * 28)
              year = cycle_start.year
              first_idx = first_cycle_of_year(year)
              cycle_in_year = (total_cycles - first_idx) + 1
              yy = year % 100
              airac_id = f"{yy:02d}{cycle_in_year:02d}"
              return airac_id, cycle_start

          def airac_to_date(airac_id):
              """Convert an AIRAC cycle ID (YYNNN) to its start date."""
              yy = int(airac_id[:2])
              nn = int(airac_id[2:])
              # Handle two-digit years: 98-99 map to 1998-1999; 00-97 map to 2000-2097
              year = 1900 + yy if yy >= 98 else 2000 + yy
              first_idx = first_cycle_of_year(year)
              # nn is 1-indexed (first cycle = 1), so subtract 1 for zero-based offset
              cycle_start = EPOCH + timedelta(days=(first_idx + nn - 1) * 28)
              return cycle_start

          airac_input = os.environ.get("AIRAC_INPUT", "").strip()

          if airac_input:
              cycle_start = airac_to_date(airac_input)
              airac_id = airac_input
              should_run = "true"
          else:
              today = date.today()
              airac_id, cycle_start = date_to_airac(today)
              should_run = "true" if today == cycle_start else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"airac_cycle={airac_id}\n")
              f.write(f"airac_date={cycle_start.isoformat()}\n")
              f.write(f"should_run={should_run}\n")

          print(f"AIRAC Cycle : {airac_id}")
          print(f"AIRAC Date  : {cycle_start}")
          print(f"Should Run  : {should_run}")
          PYEOF

  create:
    name: "Create Milestone and Release - ${{ matrix.repo }}"
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - sectorfile-afrc
          - sectorfile-afrs
          - sectorfile-afrw
          - sectorfile-dgac
          - sectorfile-dnkk
          - sectorfile-fajo
          - sectorfile-fasa
          - sectorfile-fbgr
          - sectorfile-fccc
          - sectorfile-fimm
          - sectorfile-flfi
          - sectorfile-fmmm
          - sectorfile-fnan
          - sectorfile-fqbe
          - sectorfile-fsss
          - sectorfile-fvhf
          - sectorfile-fwll
          - sectorfile-fywf
          - sectorfile-fzza
          - sectorfile-gooo
          - sectorfile-goooo
          - sectorfile-gvsc
          - sectorfile-hkna
          - sectorfile-htdc
          - sectorfile-huec
      fail-fast: false
    env:
      AIRAC_CYCLE: ${{ needs.prepare.outputs.airac_cycle }}
      AIRAC_DATE: ${{ needs.prepare.outputs.airac_date }}
      GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
    steps:
      - name: Create Milestone
        run: |
          EXISTING=$(gh api repos/VATSIM-SSA/${{ matrix.repo }}/milestones \
            --jq ".[] | select(.title == \"AIRAC $AIRAC_CYCLE\") | .number" 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            gh api repos/VATSIM-SSA/${{ matrix.repo }}/milestones \
              --method POST \
              -f title="AIRAC $AIRAC_CYCLE" \
              -f due_on="${AIRAC_DATE}T00:00:00Z" \
              -f state="open"
            echo "Milestone 'AIRAC $AIRAC_CYCLE' created in ${{ matrix.repo }}"
          else
            echo "Milestone 'AIRAC $AIRAC_CYCLE' already exists in ${{ matrix.repo }} (#$EXISTING), skipping"
          fi

      - name: Create Release
        run: |
          if ! gh api repos/VATSIM-SSA/${{ matrix.repo }}/releases/tags/$AIRAC_CYCLE &>/dev/null; then
            gh api repos/VATSIM-SSA/${{ matrix.repo }}/releases \
              --method POST \
              -f tag_name="$AIRAC_CYCLE" \
              -f target_commitish="main" \
              -f name="AIRAC $AIRAC_CYCLE" \
              -f body="AIRAC $AIRAC_CYCLE" \
              -f draft=false \
              -f prerelease=false
            echo "Release 'AIRAC $AIRAC_CYCLE' created in ${{ matrix.repo }}"
          else
            echo "Release 'AIRAC $AIRAC_CYCLE' already exists in ${{ matrix.repo }}, skipping"
          fi
