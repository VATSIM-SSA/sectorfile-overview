name: AIRAC Deployment Tracker

# The publish workflow opens the tracker issue; this one chases it.
#   * Mondays      — one Discord post: outstanding sectors (only while a cycle is
#                    live) plus every open PR across the org, busiest repo first
#   * on any edit  — close the tracker once every sector is ticked
#
# The checkbox parsing lives in repository-management/airac.py next to the code
# that writes the tracker, so the two cannot drift apart.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC — weekly report + pre-AIRAC warning
  issues:
    types: [edited]
  workflow_dispatch:
    inputs:
      force_warning:
        description: "Show the pre-AIRAC warning even when the next cycle is weeks away (for testing)."
        required: false
        default: false
        type: boolean

permissions: {}

env:
  # Discord webhook identity. The avatar MUST be a raster format — Discord's CDN
  # silently ignores an SVG and falls back to a blank default avatar.
  BOT_NAME: VATSSA Operations Bot
  BOT_ICON: https://palette.vatssa.com/logo_icon.png

concurrency:
  # A Monday nag landing on top of a tick-triggered close would double-post.
  group: airac-tracker
  cancel-in-progress: false

jobs:
  report:
    name: Report progress
    # `issues: edited` fires for every issue in the repo — ignore all but trackers.
    if: >-
      github.event_name != 'issues'
      || contains(github.event.issue.title, 'Sector Deployment Tracker')
    runs-on: ubuntu-latest
    # The PAT lives in this environment, which is restricted to `main`.
    environment: sync
    env:
      GH_TOKEN: ${{ secrets.ACT_COPY_TO_REPO_PAT }}
      # Staff channel: failures, the Monday report, the pre-AIRAC warning.
      WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      # Public channel: the "released for all sectors" announcement, alongside
      # the status board. Members read this one.
      ANNOUNCE_WEBHOOK: ${{ secrets.DISCORD_STATUS_WEBHOOK }}
      RELEASED_ID: ${{ vars.RELEASED_MESSAGE_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Find the open tracker
        id: find
        run: |
          set -euo pipefail
          # Highest number wins: only one tracker is ever open, but if a previous
          # cycle's close failed, the newest is the one that matters.
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 200 \
                  --json number,title \
                  --jq '[.[] | select(.title | contains("Sector Deployment Tracker")) | .number] | max // empty')
          if [ -z "$NUM" ]; then
            echo "No open tracker — nothing to chase."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tracker: #$NUM"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "number=$NUM" >> "$GITHUB_OUTPUT"
          fi

      - name: Read progress
        id: prog
        if: steps.find.outputs.found == 'true'
        env:
          NUMBER: ${{ steps.find.outputs.number }}
        run: |
          set -euo pipefail
          gh issue view "$NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq .body > /tmp/tracker.md
          # tee so the counts show in the run log as well as feeding later steps.
          python3 repository-management/airac.py --progress /tmp/tracker.md | tee -a "$GITHUB_OUTPUT"

      - name: Close the tracker once every sector is ticked
        if: steps.find.outputs.found == 'true' && steps.prog.outputs.complete == 'true'
        env:
          NUMBER: ${{ steps.find.outputs.number }}
          CYCLE: ${{ steps.prog.outputs.cycle }}
          TOTAL: ${{ steps.prog.outputs.total }}
        run: |
          set -euo pipefail
          gh issue comment "$NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "All ${TOTAL} sectors deployed for AIRAC ${CYCLE}. Closing automatically."
          gh issue close "$NUMBER" --repo "$GITHUB_REPOSITORY"
          echo "Closed tracker #$NUMBER"

          if [ -z "${ANNOUNCE_WEBHOOK:-}" ]; then
            echo "::warning::DISCORD_STATUS_WEBHOOK not set — no announcement sent."
            exit 0
          fi
          python3 - > /tmp/payload.json << 'PYEOF'
          import json, os

          cycle = os.environ["CYCLE"]
          total = os.environ["TOTAL"]
          print(json.dumps({
              "username": os.environ["BOT_NAME"],
              "avatar_url": os.environ["BOT_ICON"],
              "embeds": [{
                  "title": f"AIRAC {cycle} has been released for all sectors",
                  "url": "https://files.aero-nav.com",
                  "color": 8116056,
                  "description": (
                      f"All **{total}** sector files are now on AIRAC {cycle}.\n\n"
                      f"**This is a mandatory update.** Please update immediately — "
                      f"support for older sector file versions is discontinued.\n\n"
                      f"Download links for every sector are on the status board."
                  ),
              }],
          }))
          PYEOF

          # Only one "released for all sectors" message should ever exist. Delete
          # last cycle's before posting this one — otherwise the channel fills up
          # with stale mandatory-update notices for cycles nobody cares about now.
          if [ -n "${RELEASED_ID:-}" ]; then
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
                     -X DELETE "${ANNOUNCE_WEBHOOK}/messages/${RELEASED_ID}")
            case "$CODE" in
              204) echo "Deleted the previous announcement (${RELEASED_ID})" ;;
              404) echo "::notice::Previous announcement ${RELEASED_ID} already gone." ;;
              *)   echo "::warning::Could not delete ${RELEASED_ID} (HTTP $CODE) — continuing." ;;
            esac
          fi

          # ?wait=true so Discord returns the message and we can record its id.
          ID=$(curl -sS -H "Content-Type: application/json" \
                 -X POST "${ANNOUNCE_WEBHOOK}?wait=true" -d @/tmp/payload.json \
               | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "Announced AIRAC ${CYCLE} as message ${ID}"
          gh variable set RELEASED_MESSAGE_ID --repo "$GITHUB_REPOSITORY" --body "$ID"

      - name: Monday report
        # Only on the schedule (or a manual run) — posting on every checkbox tick
        # would turn Discord into a firehose. Deliberately NOT gated on a tracker
        # existing: the pull-request review goes out every Monday regardless.
        if: github.event_name != 'issues'
        env:
          ORG: ${{ github.repository_owner }}
          FORCE_WARNING: ${{ inputs.force_warning }}
          FOUND: ${{ steps.find.outputs.found }}
          NUMBER: ${{ steps.find.outputs.number }}
          CYCLE: ${{ steps.prog.outputs.cycle }}
          TOTAL: ${{ steps.prog.outputs.total }}
          DONE: ${{ steps.prog.outputs.done }}
          REMAINING: ${{ steps.prog.outputs.remaining }}
          COMPLETE: ${{ steps.prog.outputs.complete }}
          OUTSTANDING: ${{ steps.prog.outputs.outstanding }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK not set — no report sent."
            exit 0
          fi

          # `archived:false` is a native search qualifier, so archived repos never
          # enter the result set — no post-filtering, no extra API calls.
          gh api -X GET search/issues \
            -f q="org:${ORG} is:pr is:open archived:false" \
            -f per_page=100 --paginate \
            --jq '.items[].repository_url' > /tmp/prs.txt

          python3 - > /tmp/payload.json << 'PYEOF'
          import collections, json, os, sys
          sys.path.insert(0, "repository-management")
          from airac import next_airac, human

          org = os.environ["ORG"]
          embeds = []

          # Pre-AIRAC warning. Cycles always start on a Thursday and this report
          # runs on Mondays, so the "3 days out" Monday happens once every four.
          nxt, nxt_date, days = next_airac()
          if days <= 4 or os.environ.get("FORCE_WARNING") == "true":
              embeds.append({
                  "title": f"⚠️ AIRAC {nxt} goes live in {days} days",
                  "url": f"https://github.com/{org}/sectorfile-overview/pulls",
                  "color": 16426522,
                  "description": (
                      f"Effective **{human(nxt_date)}**.\n\n"
                      f"Merge anything that needs to be in this cycle **before then** — "
                      f"open pull requests are listed below. Once the cycle publishes, "
                      f"whatever is still open rolls to AIRAC {nxt} and ships a cycle late."
                  ),
              })

          # Sector deployment — only while a cycle is genuinely outstanding.
          # total == 0 means the tracker did not parse (wrong format, someone
          # rewrote the body). Saying "0/0 deployed" would be a lie, so say
          # nothing and make the run log complain instead.
          total = int(os.environ.get("TOTAL") or 0)
          if os.environ.get("FOUND") == "true" and total == 0:
              print("::warning::Tracker found but parsed 0 sectors — is it in the old format?")

          if os.environ.get("FOUND") == "true" and total > 0 and os.environ.get("COMPLETE") == "false":
              tracker = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['NUMBER']}"
              names = [n for n in os.environ.get("OUTSTANDING", "").split(", ") if n]
              # Discord embeds cap at 4096 chars; 25 sectors is nowhere near it,
              # but cap anyway so a registry that grows can never 400.
              shown = names[:20]
              listed = "\n".join(f"• {n}" for n in shown)
              if len(names) > len(shown):
                  listed += f"\n• …and {len(names) - len(shown)} more"
              embeds.append({
                  "title": f"AIRAC {os.environ['CYCLE']} — {os.environ['DONE']}/{os.environ['TOTAL']} sectors deployed",
                  "url": tracker,
                  "color": 104368,
                  "description": (
                      f"**{os.environ['REMAINING']}** still outstanding:\n{listed}\n\n"
                      f"[Open the tracker]({tracker}) to tick them off."
                  ),
              })

          # Open pull requests, whole org, busiest repo first.
          counts = collections.Counter()
          with open("/tmp/prs.txt", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if line:
                      counts[line.rsplit("/", 1)[1]] += 1

          total = sum(counts.values())
          if total:
              rows = sorted(counts.items(), key=lambda kv: (-kv[1], kv[0]))
              shown = rows[:20]
              listed = "\n".join(
                  f"• [{repo}](https://github.com/{org}/{repo}/pulls) — **{n}**"
                  for repo, n in shown
              )
              if len(rows) > len(shown):
                  listed += f"\n• …and {len(rows) - len(shown)} more repos"
              desc = f"**{total}** open across **{len(rows)}** repositories:\n{listed}"
          else:
              desc = "Nothing open."

          embeds.append({
              "title": f"Open pull requests — {org}",
              "url": f"https://github.com/pulls?q=is%3Aopen+is%3Apr+org%3A{org}+archived%3Afalse",
              "color": 8116056 if not total else 104368,
              "description": desc,
          })

          print(json.dumps({
              "username": os.environ["BOT_NAME"],
              "avatar_url": os.environ["BOT_ICON"],
              "embeds": embeds,
          }))
          PYEOF
          curl -sS -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @/tmp/payload.json
