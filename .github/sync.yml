# ─────────────────────────────────────────────────────────────────────────────
#  Sync configuration — WHAT gets pushed to the sector-file repos
# ─────────────────────────────────────────────────────────────────────────────
#  This file says WHAT is synced.
#  repository-management/sectors.yml says WHERE it goes (the sector registry).
#
#  To sync a new file or folder:  add one entry under `sync:` below.
#  To onboard a new sector repo:  add it to repository-management/sectors.yml.
#
#  The repo list deliberately lives in ONE place (sectors.yml) so it cannot
#  drift between the sync workflow, the AIRAC workflow and the README.
#
#  HOW IT BEHAVES
#  - ADD-AND-OVERWRITE ONLY. Add a file here, it appears there. Change it here,
#    it changes there. **Deleting is NEVER synced** — a file removed here stays
#    in every sector, and any per-repo custom file that is not listed here is
#    never touched. The sync only ever writes the exact files it ships from this
#    repo. (It used to mirror with `--delete`, which wiped per-repo custom files;
#    that behaviour is gone for good.)
#  - `src` is the path in THIS repo. `dest` is the path in the target repo.
#    They do not have to match (see the vATIS entry).
#  - If a `src` listed here does not exist, the workflow FAILS LOUDLY rather
#    than skipping quietly — a sync that silently does nothing is worse than
#    one that breaks visibly.
# ─────────────────────────────────────────────────────────────────────────────

# What gets synced, and where it lands in each target repo.
sync:
  # ── EuroScope plugins ── shared binaries, same path in every repo.
  # Both stable and beta DLLs live in these folders and mirror automatically;
  # there is no per-file list to maintain.
  - src: Plugins/TopSky
    dest: Plugins/TopSky

  - src: Plugins/GroundRadar
    dest: Plugins/GroundRadar

  - src: Plugins/DiscordEuroScope
    dest: Plugins/DiscordEuroScope

  # ── vATIS profile data ── note src and dest deliberately differ.
  - src: vatis/airports-json
    dest: Plugins/vATIS Profile/Airports

  # ── GitHub issue templates ── every sector-file repo gets the same forms.
  - src: repository-management/templates/issues
    dest: .github/ISSUE_TEMPLATE
