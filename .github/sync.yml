# ─────────────────────────────────────────────────────────────────────────────
#  Sync configuration — the SINGLE source of truth
# ─────────────────────────────────────────────────────────────────────────────
#  This file controls what sectorfile-overview pushes out to the sector-file
#  repos, and which repos receive it. The workflow
#  (.github/workflows/sync-to-sectorfiles.yml) reads this file and needs no
#  edits of its own.
#
#  To sync a new file or folder:  add one entry under `sync:` below.
#  To onboard a new repo:         add one line under `targets:` below.
#  That's it. Nothing else to change anywhere.
#
#  HOW IT BEHAVES
#  - Folders are MIRRORED. Add a file here, it appears there. Change it here,
#    it changes there. **Delete it here, it is deleted there.**
#  - `src` is the path in THIS repo. `dest` is the path in the target repo.
#    They do not have to match (see the vATIS entry).
#  - If a `src` listed here does not exist, the workflow FAILS LOUDLY rather
#    than skipping quietly — a sync that silently does nothing is worse than
#    one that breaks visibly.
# ─────────────────────────────────────────────────────────────────────────────

# Repos that receive the files below.
# Adding a repo here is the ONLY step needed to onboard it.
targets:
  # ── FIRs ──
  - VATSIM-SSA/sectorfile-dgac
  - VATSIM-SSA/sectorfile-dnkk
  - VATSIM-SSA/sectorfile-fasa
  - VATSIM-SSA/sectorfile-fbgr
  - VATSIM-SSA/sectorfile-fccc
  - VATSIM-SSA/sectorfile-fimm
  - VATSIM-SSA/sectorfile-flfi
  - VATSIM-SSA/sectorfile-fmmm
  - VATSIM-SSA/sectorfile-fnan
  - VATSIM-SSA/sectorfile-fqbe
  - VATSIM-SSA/sectorfile-fsss
  - VATSIM-SSA/sectorfile-fvhf
  - VATSIM-SSA/sectorfile-fwll
  - VATSIM-SSA/sectorfile-fywf
  - VATSIM-SSA/sectorfile-fzza
  - VATSIM-SSA/sectorfile-gooo
  - VATSIM-SSA/sectorfile-gvsc
  - VATSIM-SSA/sectorfile-hkna
  - VATSIM-SSA/sectorfile-htdc
  - VATSIM-SSA/sectorfile-huec
  # ── Oceanic ──
  - VATSIM-SSA/sectorfile-goooo
  - VATSIM-SSA/sectorfile-fajo
  # ── Regional ──
  - VATSIM-SSA/sectorfile-afrc
  - VATSIM-SSA/sectorfile-afrs
  - VATSIM-SSA/sectorfile-afrw

# What gets synced, and where it lands in each target repo.
sync:
  # ── EuroScope plugins ── shared binaries, same path in every repo.
  # Both stable and beta DLLs live in these folders and mirror automatically;
  # there is no per-file list to maintain.
  - src: Plugins/TopSky
    dest: Plugins/TopSky

  - src: Plugins/GroundRadar
    dest: Plugins/GroundRadar

  - src: Plugins/DiscordEuroScope
    dest: Plugins/DiscordEuroScope

  # ── vATIS profile data ── note src and dest deliberately differ.
  - src: vatis/airports-json
    dest: Plugins/vATIS Profile/Airports

  # ── GitHub issue templates ── every sector-file repo gets the same forms.
  - src: repository-management/templates/issues
    dest: .github/ISSUE_TEMPLATE
