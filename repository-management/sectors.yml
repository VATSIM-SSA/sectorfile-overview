# ─────────────────────────────────────────────────────────────────────────────
#  Sector registry — the SINGLE source of truth for "what sectors exist"
# ─────────────────────────────────────────────────────────────────────────────
#  Everything that needs to know about the sector repos reads THIS file:
#
#    - .github/workflows/sync-to-sectorfiles.yml       (which repos receive files)
#    - .github/workflows/create-airac-milestone-release.yml
#                                    (milestones, releases, the AIRAC tracker)
#
#  Adding a sector = one entry here. Nothing else to edit.
#
#  FIELDS
#    repo      GitHub repo name under VATSIM-SSA.
#    code      The aero-nav code. Used for the download + GNG links.
#              ⚠️ This is NOT always the repo suffix — see FYWH below, whose
#              repo is `sectorfile-fywf`. Never derive one from the other.
#    name      Display name, as it should appear in the AIRAC tracker issue.
#    category  Standard | Oceanic | FSS — groups the tracker issue.
#
#  Links are built as:
#    Download  https://files.aero-nav.com/<code>
#    GitHub    https://github.com/VATSIM-SSA/<repo>
#    GNG       https://gng.aero-nav.com/<code>/
# ─────────────────────────────────────────────────────────────────────────────

sectors:
  # ── Standard ──────────────────────────────────────────────────────────────
  - repo: sectorfile-dgac
    code: DGAC
    name: DGAC Accra
    category: Standard

