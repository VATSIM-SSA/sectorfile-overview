# ─────────────────────────────────────────────────────────────────────────────
#  Sector registry — the SINGLE source of truth for "what sectors exist"
# ─────────────────────────────────────────────────────────────────────────────
#  Everything that needs to know about the sector repos reads THIS file:
#
#    - .github/workflows/sync-to-sectorfiles.yml       (which repos receive files)
#    - .github/workflows/create-airac-milestone-release.yml
#                                    (milestones, releases, the AIRAC tracker)
#    - .github/workflows/sector-status.yml             (the Discord status board)
#
#  Adding a sector = one entry here. Nothing else to edit.
#
#  ORDER IS SIGNIFICANT. The tracker issue and the Discord status board render
#  sectors in exactly the order they appear below, grouped by `region` in the
#  order each region first appears. Reordering this file reorders both.
#
#  FIELDS
#    repo      GitHub repo name under VATSIM-SSA.
#    code      The aero-nav code. Used for the download + GNG links.
#              ⚠️ This is NOT always the repo suffix — see FYWH below, whose
#              repo is `sectorfile-fywf`. Never derive one from the other.
#    name      Display name, as it appears in the AIRAC tracker issue.
#    region    Groups both the tracker issue and the status board.
#    label     OPTIONAL. What the status board calls it. Defaults to `code`.
#              Only set where the board should say more than the bare code.
#    includes  OPTIONAL. Extra airports folded into this sector file, shown as
#              a trailing note on the status board.
#    vatis     OPTIONAL. Set true when the repo has vATIS/<code>.json. Oceanic
#              and FSS sectors have no ATIS, so they have no profile. If you add
#              a profile to a repo, set this — nothing detects it automatically.
#
#  Links are built as:
#    Download  https://files.aero-nav.com/<code>
#              ⚠️ Overridable per sector — edit the [Download](...) link on the
#              tracker line to point somewhere else (e.g. a Discord ticket when
#              a sector is temporarily unavailable). The override carries over
#              to the next cycle's tracker.
#    GitHub    https://github.com/VATSIM-SSA/<repo>
#    GNG       https://gng.aero-nav.com/<code>/
#    vATIS     https://github.com/VATSIM-SSA/<repo>/releases/latest/download/<code>.json
#              ⚠️ Deliberately the RELEASE ASSET, not the file on main. A raw
#              GitHub URL serves text/plain with no Content-Disposition, so the
#              browser renders the JSON instead of downloading it. Release assets
#              send `Content-Disposition: attachment` and download properly. The
#              publish workflow uploads the asset on every release.
# ─────────────────────────────────────────────────────────────────────────────

sectors:
  # ── Southern Africa ───────────────────────────────────────────────────────
  - repo: sectorfile-fasa
    code: FASA
    vatis: true
    name: FASA Cape Town + Johannesburg
    region: Southern Africa
    includes: FACA and FAJA

  - repo: sectorfile-fbgr
    code: FBGR
    vatis: true
    name: FBGR Gaborone
    region: Southern Africa

